name: CI

# Runs on every PR and every push to main. Fails closed on unit-test
# failures so specs can't silently rot. Added 2026-04-21 as part of
# Scope 3 Step 2b.1 PR 1 — before this, the repo had only a deploy
# workflow (deploy-demo.yml) that ran on push-to-main without a test
# gate.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.18.1

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Migration journal check
        # Fails the PR if a drizzle/*.sql file isn't registered in
        # meta/_journal.json (and isn't a known out-of-band migration).
        # An un-journaled file silently never runs via drizzle-kit migrate —
        # the exact cause of the 0019 / 0055 production outages. No DB needed.
        run: pnpm db:check-journaled

      - name: Unit tests
        run: pnpm test:unit

      - name: BLOCK.md emit drift-detector
        run: pnpm emit:blocks:check

      - name: Event-registry drift-detector
        run: pnpm emit:event-registry:check
