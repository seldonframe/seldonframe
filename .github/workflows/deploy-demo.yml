name: Deploy Demo

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.18.1

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Migration journal check
        # Gate the deploy on every drizzle/*.sql being registered in
        # meta/_journal.json (or a known out-of-band migration). Catches the
        # 0019 / 0055 outage shape before it ships. No DB needed.
        run: pnpm db:check-journaled

      - name: Unit tests
        run: pnpm test:unit

      - name: BLOCK.md emit drift-detector
        run: pnpm emit:blocks:check

      - name: Event-registry drift-detector
        run: pnpm emit:event-registry:check

      - name: Build
        run: pnpm build

      - name: Deploy to Vercel
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
