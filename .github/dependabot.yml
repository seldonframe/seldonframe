# Dependabot for the pnpm monorepo + the published MCP package.
# Root "npm" entry reads pnpm-lock.yaml (workspace-aware), so packages/crm
# and the other workspace packages are covered from "/". skills/mcp-server
# has its own package-lock.json (published to npm independently), so it
# gets its own entry. Weekly + grouped minor/patch keeps PR noise low;
# security updates always open immediately regardless of schedule.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # workflow 4.6.0 / @workflow/next 4.1.0 break the Vercel build: their
    # step-route bundler inlines our "use server" action files into sync
    # __esm() closures, which Turbopack rejects ("Server Actions must be
    # async functions"). Held at 4.2.4 / 4.0.5 — see issue #135; drop these
    # ignores once an upstream bundler fix ships.
    ignore:
      - dependency-name: "workflow"
      - dependency-name: "@workflow/next"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "npm"
    directory: "/skills/mcp-server"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
